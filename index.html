<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<script>
(function(){
  const ok = sessionStorage.getItem('auth');
  if(ok === '1') return;
  const pw = prompt('パスワードを入力してください');
  if(pw === 'keiba') {
    sessionStorage.setItem('auth','1');
  } else {
    document.documentElement.innerHTML = '';
    location.href = 'about:blank';
  }
})();
</script>
<title>競馬シミュレーション ダッシュボード v2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#c9d1d9;font-family:"Segoe UI",Arial,sans-serif;font-size:14px;line-height:1.5}
h1{color:#58a6ff;padding:16px 24px 10px;font-size:20px;border-bottom:1px solid #21262d;display:flex;align-items:center;gap:10px}
.container{padding:16px 24px}
.section-title{color:#79c0ff;font-size:14px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}

/* Filter card */
.filter-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:16px;margin-bottom:20px}
.filter-row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:4px}
.fl{font-size:11px;color:#8b949e;margin-bottom:2px}
.filter-sel{background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:5px 8px;font-size:12px;outline:none;cursor:pointer;min-width:80px}
.filter-sel:focus{border-color:#58a6ff}
.dist-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.dcb{display:flex;align-items:center;gap:3px;background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:3px 7px;cursor:pointer;font-size:11px;color:#c9d1d9;user-select:none}
.dcb:hover{border-color:#58a6ff}
.dcb input{accent-color:#58a6ff}
.btn-reset{background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:6px 14px;cursor:pointer;font-size:12px;transition:all .15s}
.btn-reset:hover{border-color:#58a6ff;color:#c9d1d9}
.race-count-chip{background:#21262d;border:1px solid #30363d;border-radius:12px;padding:3px 12px;font-size:12px;color:#8b949e;margin-left:auto;align-self:center}

/* Slots grid */
.slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:600px){.slots-grid{grid-template-columns:1fr}}
.slot-card{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:14px;transition:border-color .2s,padding .2s}
.slot-card:not(.slot-on-1):not(.slot-on-2):not(.slot-on-3):not(.slot-on-4){padding:10px 14px}
.slot-card.slot-on-1{border-color:#1f3a5f}
.slot-card.slot-on-2{border-color:#1a3a1f}
.slot-card.slot-on-3{border-color:#3a2e10}
.slot-card.slot-on-4{border-color:#3a1a1a}
.slot-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toggle-btn{width:36px;height:20px;border-radius:10px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-btn::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.toggle-btn.on{background:#3fb950}
.toggle-btn.on::after{left:19px}
.toggle-btn.off{background:#484f58}
.slot-name-input{background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:4px 8px;font-size:13px;width:120px}
.slot-name-input:focus{outline:none;border-color:#58a6ff}
.points-badge{border-radius:12px;padding:2px 10px;font-size:12px;font-weight:700;margin-left:auto}
.badge-1{background:#1f3a5f;color:#58a6ff;border:1px solid #388bfd}
.badge-2{background:#1a3a1f;color:#3fb950;border:1px solid #2ea043}
.badge-3{background:#3a2e10;color:#d29922;border:1px solid #bb8009}
.badge-4{background:#3a1a1a;color:#f78166;border:1px solid #da3633}

/* Bet count selector */
.kind-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;font-size:12px;color:#8b949e}
.kind-btns{display:flex;gap:4px}
.kind-btn{background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:3px 10px;cursor:pointer;font-size:12px;transition:all .15s}
.kind-btn.active-1{background:#1f3a5f;border-color:#388bfd;color:#58a6ff}
.kind-btn.active-2{background:#1a3a1f;border-color:#2ea043;color:#3fb950}
.kind-btn.active-3{background:#3a2e10;border-color:#bb8009;color:#d29922}
.kind-btn.active-4{background:#3a1a1a;border-color:#da3633;color:#f78166}

/* Bet type panel */
.bet-panel{border-left:3px solid #30363d;padding:8px 10px;margin-bottom:8px;background:#0d1117;border-radius:0 4px 4px 0}
.bet-panel.bp-1{border-left-color:#58a6ff}
.bet-panel.bp-2{border-left-color:#3fb950}
.bet-panel.bp-3{border-left-color:#d29922}
.bet-panel-title{font-size:11px;color:#8b949e;margin-bottom:6px;font-weight:600}
.bp-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
.bp-label{font-size:11px;color:#8b949e;white-space:nowrap;min-width:60px}
.bp-sel{background:#161b22;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:3px 6px;font-size:11px;outline:none;cursor:pointer}
.bp-sel:focus{border-color:#58a6ff}
.bp-num{background:#161b22;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:3px 6px;font-size:11px;width:54px;text-align:right}
.bp-num:focus{outline:none;border-color:#58a6ff}
.bp-text{background:#161b22;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:3px 6px;font-size:11px;width:90px}
.bp-text:focus{outline:none;border-color:#58a6ff}
.bp-budget{background:#161b22;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;padding:3px 6px;font-size:11px;width:70px;text-align:right;-moz-appearance:textfield}
.bp-budget:focus{outline:none;border-color:#58a6ff}
.bp-budget::-webkit-inner-spin-button,.bp-budget::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

/* 3連単 permutations */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin:4px 0}
.perm-cb{display:flex;align-items:center;gap:4px;font-size:11px;color:#c9d1d9;cursor:pointer;user-select:none}
.perm-cb input{accent-color:#58a6ff}

/* Comparison table */
.cmp-section{margin-bottom:20px}
.cmp-wrap{overflow-x:auto}
table.cmp-table{width:100%;border-collapse:collapse;font-size:13px}
.cmp-table th{background:#21262d;color:#8b949e;padding:8px 10px;border:1px solid #30363d;text-align:center;white-space:nowrap}
.cmp-table th.metric-h{text-align:left}
.cmp-table td{padding:7px 10px;border:1px solid #21262d;text-align:right;font-family:monospace;white-space:nowrap}
.cmp-table td.metric{text-align:left;color:#8b949e;font-family:inherit;font-size:12px}
.cmp-table tr:hover td{background:#1c2128}
.good{color:#3fb950;font-weight:600}
.warn{color:#d29922}
.bad{color:#f85149}

/* Race table */
.race-section{margin-bottom:20px}
.race-filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.rfbtn{background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:4px 12px;cursor:pointer;font-size:12px;transition:all .15s}
.rfbtn.active{background:#388bfd;border-color:#388bfd;color:#fff}
.rfbtn:hover{border-color:#58a6ff;color:#c9d1d9}
.col-w-row{display:none}
.race-wrap{overflow-x:auto;max-height:520px;overflow-y:auto;border:1px solid #21262d;border-radius:4px}
table.race-table{border-collapse:collapse;font-size:12px;min-width:600px}
table.race-table th{background:#21262d;color:#8b949e;padding:6px 10px;border:1px solid #30363d;position:sticky;top:0;z-index:1;white-space:nowrap;text-align:right}
table.race-table th.lh{text-align:left}
table.race-table td{padding:5px 10px;border-bottom:1px solid #161b22;white-space:nowrap;text-align:right}
table.race-table td.lh{text-align:left}
table.race-table tr:hover td{background:#1c2128}
.row-hit td{background:#0d2312 !important}
.row-miss td{background:#0d1117}
.hit-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.hb-y{background:#0d4a21;color:#3fb950;border:1px solid #1a7a32}
.hb-n{background:#2d1112;color:#f85149;border:1px solid #5a1a1a}
/* レース行 結果セル用クラス（インラインスタイル削減） */
.ri-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;white-space:nowrap}
.ri-pop{font-size:10px;font-weight:700;min-width:28px}
.ri-c1{color:#f5a623}.ri-c2{color:#9b59b6}.ri-c3{color:#2980b9}.ri-cx{color:#8b949e}
.ri-chu{font-size:10px;color:#8b949e;min-width:24px}
.ri-nm{font-size:12px;font-weight:600;color:#e6edf3}
.ri-pp{font-size:10px;color:#8b949e}
.prof-pos{color:#3fb950}.prof-neg{color:#f85149}
.pop-num{display:inline-block;width:20px;height:20px;border-radius:50%;text-align:center;line-height:20px;font-size:11px;font-weight:700}
.p1{background:#f5a623;color:#000}
.p2{background:#9b59b6;color:#fff}
.p3{background:#2980b9;color:#fff}
.px{background:#2d333b;color:#c9d1d9}
/* 枠色バッジ */
.waku-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:12px;font-weight:700;border:1px solid rgba(0,0,0,0.3)}
.waku-1{background:#fff;color:#000}
.waku-2{background:#000;color:#fff}
.waku-3{background:#e00;color:#fff}
.waku-4{background:#0066cc;color:#fff}
.waku-5{background:#ffe600;color:#000}
.waku-6{background:#008800;color:#fff}
.waku-7{background:#ff8800;color:#fff}
.waku-8{background:#ff88cc;color:#000}
/* 行クリック */
.race-row{cursor:pointer}
.race-row:hover td{filter:brightness(1.15)}
/* モーダル */
#detail-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
#detail-modal.open{display:flex}
#detail-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;min-width:480px;max-width:680px;width:90%;position:relative;max-height:90vh;overflow-y:auto}
#detail-box h3{margin:0 0 16px;font-size:16px;color:#e6edf3}
#detail-box .close-btn{position:absolute;top:12px;right:16px;background:none;border:none;color:#8b949e;font-size:20px;cursor:pointer;line-height:1}
.detail-table{width:100%;border-collapse:collapse;font-size:13px}
.detail-table th{color:#8b949e;padding:6px 10px;border-bottom:1px solid #30363d;text-align:left;white-space:nowrap}
.detail-table td{padding:6px 10px;border-bottom:1px solid #21262d;color:#c9d1d9;white-space:nowrap}
.detail-table tr:last-child td{border-bottom:none}
.rank-1{color:#f5a623;font-weight:700}
.rank-2{color:#9b59b6;font-weight:700}
.rank-3{color:#2980b9;font-weight:700}
</style>
</head>
<body>

<!-- レース詳細モーダル -->
<div id="detail-modal" onclick="if(event.target===this)closeModal()">
  <div id="detail-box">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3 id="modal-title"></h3>
    <div id="modal-meta" style="font-size:12px;color:#8b949e;margin-bottom:14px"></div>
    <table class="detail-table">
      <thead><tr><th>着順</th><th>枠</th><th>馬番</th><th>人気</th><th>馬名</th><th>騎手</th><th>調教師</th></tr></thead>
      <tbody id="modal-body"></tbody>
    </table>
    <div id="modal-pay" style="margin-top:16px;font-size:13px;display:flex;gap:24px;flex-wrap:wrap"></div>
  </div>
</div>

<h1>&#x1F40E; 競馬シミュレーション ダッシュボード <span style="font-size:13px;font-weight:400;color:#8b949e">v2</span></h1>
<div class="container">

<!-- SLOTS -->
<div class="section-title">システム設定（4スロット比較）</div>
<div class="slots-grid" id="slots-grid"></div>

<!-- FILTERS -->
<div class="filter-card">
  <div class="section-title" style="margin-bottom:10px">データフィルタ</div>
  <div class="filter-row">
    <div class="fg">
      <div class="fl">トラック</div>
      <select class="filter-sel" id="f_track" onchange="applyFilters()">
        <option value="">すべて</option>
        <option value="芝">芝</option>
        <option value="ダート">ダート</option>
      </select>
    </div>
    <div class="fg">
      <div class="fl">年</div>
      <div class="dist-wrap" id="year-filters"></div>
    </div>
    <div class="fg">
      <div class="fl">月</div>
      <div class="dist-wrap" id="month-filters"></div>
    </div>
    <div class="fg">
      <div class="fl">開催日</div>
      <select class="filter-sel" id="f_date" onchange="applyFilters()"><option value="">すべて</option></select>
    </div>
    <div class="fg">
      <div class="fl">気温区分</div>
      <select class="filter-sel" id="f_temp" onchange="applyFilters()">
        <option value="">すべて</option>
        <option value="0">極寒（〜5℃）</option>
        <option value="1">寒い（5〜15℃）</option>
        <option value="2">普通（15〜25℃）</option>
        <option value="3">暑い（25〜30℃）</option>
        <option value="4">猛暑（30℃〜）</option>
      </select>
    </div>
    <div class="fg">
      <div class="fl">決着人気波乱度</div>
      <select class="filter-sel" id="f_upset" onchange="applyFilters()">
        <option value="">すべて</option>
        <option value="0">堅い（1-2-3人気）</option>
        <option value="1">やや堅い（上位5以内）</option>
        <option value="2">中波乱（〜8人気）</option>
        <option value="3">大波乱（9人気以上含む）</option>
        <option value="4">超波乱（12人気以上含む）</option>
      </select>
    </div>
    <div class="fg">
      <div class="fl">距離</div>
      <div class="dist-wrap" id="dist-filters"></div>
    </div>
    <div class="fg">
      <div class="fl">馬名・騎手・調教師</div>
      <input type="text" id="f_name" class="filter-sel" placeholder="例：コントレイル" style="min-width:140px" oninput="applyFilters()">
    </div>
    <button class="btn-reset" onclick="resetFilters()">リセット</button>
    <div class="race-count-chip" id="race-count-chip">0 レース</div>
  </div>
</div>

<!-- COMPARISON TABLE -->
<div class="cmp-section">
  <div class="section-title">比較サマリ</div>
  <div class="cmp-wrap"><table class="cmp-table" id="cmp-table"><tbody></tbody></table></div>
</div>

<!-- RACE TABLE -->
<div class="race-section">
  <div class="section-title">レース詳細</div>
  <div class="col-w-row">
    列幅：<input type="range" id="col-w-slider" min="80" max="320" value="150" oninput="updateColWidth()">
    <span id="col-w-val">150px</span>
  </div>
  <div class="race-filter-bar" id="race-filter-bar"></div>
  <div class="race-wrap"><table class="race-table" id="race-table"><thead></thead><tbody></tbody></table></div>
  <div id="race-pagination" style="display:flex;align-items:center;gap:8px;margin-top:8px"></div>
</div>

</div>

// --- 傾斜計算用：人気コンボ別・最大人気別 配当統計を事前集計 ---
const _comboStats = {};   // "1,2,3" → {n, sum}
const _maxPopStats = {};  // 5 → {n, sum}
RACES.forEach(r => {
  if(!r.top3 || r.top3.length < 3 || !r.payout) return;
  const key = [...r.top3].sort((a,b)=>a-b).join(',');
  if(!_comboStats[key]) _comboStats[key] = {n:0, sum:0};
  _comboStats[key].n++; _comboStats[key].sum += r.payout;
  const mx = Math.max(...r.top3);
  if(!_maxPopStats[mx]) _maxPopStats[mx] = {n:0, sum:0};
  _maxPopStats[mx].n++; _maxPopStats[mx].sum += r.payout;
});
const _overallAvg = (() => {
  const all = Object.values(_comboStats).reduce((a,v)=>({n:a.n+v.n,sum:a.sum+v.sum}),{n:0,sum:0});
  return all.n ? all.sum/all.n : 1500;
})();
const SLOPE_MIN_SAMPLES = 5;

function estimatePayout(key) {
  // ③ 過去データ（サンプル数十分な場合）
  const s = _comboStats[key];
  if(s && s.n >= SLOPE_MIN_SAMPLES) return s.sum / s.n;
  // ② 最大人気ティア別平均（近いティアで補完）
  const mx = Math.max(...key.split(',').map(Number));
  for(let d=0; d<=10; d++) {
    for(const t of (d===0 ? [mx] : [mx+d, mx-d])) {
      if(t < 1) continue;
      const ts = _maxPopStats[t];
      if(ts && ts.n >= 3) return ts.sum / ts.n;
    }
  }
  return _overallAvg;
}

function computeSlopeWeights(combs, budget) {
  // 各組み合わせの推定配当の逆数比例で配分
  const ests = combs.map(k => ({k, est: estimatePayout(k)}));
  const invSum = ests.reduce((s,e) => s + 1/e.est, 0);
  const weights = {};
  ests.forEach(({k, est}) => { weights[k] = (1/est) / invSum; });
  // 最低¥100/組み合わせ を保証（比率を再調整）
  // ※固定済みキーを追跡して無限ループを防ぐ
  const minFrac = 100 / budget;
  const fixedKeys = new Set();
  for(let iter = 0; iter < combs.length; iter++) {
    let newlyFixed = false;
    let fixedSum = 0, freeSum = 0;
    const free = [];
    for(const k of combs) {
      if(fixedKeys.has(k) || weights[k] <= minFrac + 1e-9) {
        if(!fixedKeys.has(k)) { fixedKeys.add(k); newlyFixed = true; }
        weights[k] = minFrac;
        fixedSum += minFrac;
      } else {
        free.push(k);
        freeSum += weights[k];
      }
    }
    if(!newlyFixed) break; // 新たに固定されたものがなければ収束
    if(free.length === 0) { combs.forEach(k => { weights[k] = 1/combs.length; }); break; }
    const scale = freeSum > 0 ? Math.max(0, 1 - fixedSum) / freeSum : 0;
    free.forEach(k => { weights[k] = weights[k] * scale; });
  }
  return weights;
}

function applyFilters() {
  const track = document.getElementById('f_track').value;
  const date  = document.getElementById('f_date').value;
  const temp  = document.getElementById('f_temp').value;
  const upset = document.getElementById('f_upset').value;
  const nameQ = document.getElementById('f_name').value.trim();
  const checkedYears  = new Set([...document.querySelectorAll('.year-cb:checked')].map(e=>e.value));
  const checkedMonths = new Set([...document.querySelectorAll('.month-cb:checked')].map(e=>+e.value));
  const checkedDists  = new Set([...document.querySelectorAll('.dist-cb:checked')].map(e=>e.value));
  updateDateOptions(checkedYears, checkedMonths);
  activeRaces = RACES.filter(r => {
    if(track && r.track !== track) return false;
    if(!checkedYears.has(r.date.slice(0,4))) return false;
    const mo = parseInt(r.date.replace(/^\d{4}年(\d+)月.*$/,'$1'));
    if(!checkedMonths.has(mo)) return false;
    if(date && r.date !== date) return false;
    if(temp !== '') {
      const t = r.temp;
      const band = t < 5 ? 0 : t < 15 ? 1 : t < 25 ? 2 : t < 30 ? 3 : 4;
      if(band !== parseInt(temp)) return false;
    }
    if(upset !== '') {
      const mx = Math.max(...r.top3);
      const u = mx <= 3 ? 0 : mx <= 5 ? 1 : mx <= 8 ? 2 : mx <= 11 ? 3 : 4;
      if(u !== parseInt(upset)) return false;
    }
    if(!checkedDists.has(r.distance)) return false;
    if(nameQ) {
      const q = nameQ.toLowerCase();
      const info = r.top3_info || [];
      const allR = r.all_runners || [];
      const searchList = allR.length > 0 ? allR : info;
      const hit = searchList.some(h =>
        (h.horse||'').toLowerCase().includes(q) ||
        (h.jockey||'').toLowerCase().includes(q) ||
        (h.trainer||'').toLowerCase().includes(q)
      );
      if(!hit) return false;
    }
    return true;
  });
  // 日付・レース番号を数値で正しくソート
  function dateKey(r) {
    const m = r.date.match(/(\d{4})年(\d+)月(\d+)日/);
    return m ? parseInt(m[1])*10000 + parseInt(m[2])*100 + parseInt(m[3]) : 0;
  }
  function raceNumKey(r) { return parseInt(r.race_num); }
  activeRaces.sort((a,b) => dateKey(a) - dateKey(b) || raceNumKey(a) - raceNumKey(b));
  document.getElementById('race-count-chip').textContent = activeRaces.length + ' レース';
  racePage = 0;
  recalcAll();
}

function updateDateOptions(checkedYears, checkedMonths) {
  const dsel = document.getElementById('f_date');
  const cur = dsel.value;
  const dates = [...new Set(RACES.filter(r => {
    if(!checkedYears.has(r.date.slice(0,4))) return false;
    const mo = parseInt(r.date.replace(/^\d{4}年(\d+)月.*$/,'$1'));
    if(!checkedMonths.has(mo)) return false;
    return true;
  }).map(r=>r.date))].sort((a,b)=>{
    const km = d => { const x=d.match(/(\d{4})年(\d+)月(\d+)日/); return x?+x[1]*10000+ +x[2]*100+ +x[3]:0; };
    return km(a)-km(b);
  });
  dsel.innerHTML = '<option value="">すべて</option>' +
    dates.map(d=>`<option value="${d}"${d===cur?' selected':''}>${d}</option>`).join('');
}

    <input class="slot-name-input" value="${escHtml(sl.name)}" oninput="slots[${si}].name=this.value;recalcAll()" placeholder="名前">
    <span class="points-badge ${BADGE_CLS[si]}" id="pts-badge-${si}">${pts}点</span>
  </div>
  <div class="kind-row">
    <span>何種類かける：</span>
    <div class="kind-btns">
      ${[1,2,3].map(k=>`<button class="kind-btn${sl.kinds===k?' '+ACTIVE_CLS[si]:''}" onclick="setKinds(${si},${k})">${k}</button>`).join('')}
    </div>
  </div>`;
  for(let bi=0;bi<3;bi++){
    const show = bi < sl.kinds;
    html += `<div id="bp-${si}-${bi}" style="display:${show?'block':'none'}">${buildBetPanel(si,bi)}</div>`;
  }

  // 重複除外設定セクション（同スロット内・種類間のみ）
  if(sl.kinds > 1) {
    const rawTotal = (() => { let t=0; for(let bi=0;bi<sl.kinds;bi++) t+=getCount(sl.bets[bi]); return t; })();
    const effPts = effectiveSlotPoints(si);
    const dedupCount = rawTotal - effPts;
    const labels = ['第1種','第2種','第3種'];
    const pairs = sl.dedupPairs || [];
    html += `<div style="margin-top:10px;padding:8px 10px;background:#0d1117;border-radius:4px;border:1px solid #30363d">
      <div style="font-size:11px;color:#8b949e;margin-bottom:6px;font-weight:600">🔀 重複除外設定</div>
      <div style="display:flex;flex-direction:column;gap:4px">`;
    for(let f=0;f<sl.kinds;f++) for(let t2=0;t2<sl.kinds;t2++) {
      if(f===t2) continue;
      const active = pairs.some(p=>p[0]===f&&p[1]===t2);
      html += `<label style="display:flex;align-items:center;gap:4px;font-size:11px;color:#c9d1d9;cursor:pointer;user-select:none">
        <input type="checkbox" ${active?'checked':''} onchange="toggleDedupPair(${si},${f},${t2},this.checked)" style="accent-color:#d29922">
        <span style="color:#d29922">${labels[f]}の組み合わせを</span>${labels[t2]}から除外
      </label>`;
    }
    html += `</div>`;
    if(dedupCount > 0) {
      html += `<div style="margin-top:6px;font-size:11px;color:#d29922">実効点数：${effPts}点 <span style="color:#555">（元${rawTotal}点 → </span><span style="color:#f85149">−${dedupCount}点</span><span style="color:#555">削減）</span></div>`;
    }
    html += `</div>`;
  }

  return html;
}

function toggleDedupPair(si, from, to, on) {
  if(!slots[si].dedupPairs) slots[si].dedupPairs = [];
  if(on) {
    if(!slots[si].dedupPairs.some(p=>p[0]===from&&p[1]===to))
      slots[si].dedupPairs.push([from, to]);
  } else {
    slots[si].dedupPairs = slots[si].dedupPairs.filter(p=>!(p[0]===from&&p[1]===to));
  }
  document.getElementById(`slot-card-${si}`).innerHTML = buildSlotHTML(si);
  recalcAll();
}

function toggleSlot(si) {
  slots[si].on = !slots[si].on;
  const card = document.getElementById(`slot-card-${si}`);
  CARD_ON_CLS.forEach(c=>card.classList.remove(c));
  if(slots[si].on) card.classList.add(CARD_ON_CLS[si]);
  card.innerHTML = buildSlotHTML(si);
  recalcAll();
}

function setKinds(si, k) {
  slots[si].kinds = k;
  rebuildSlot(si);
  recalcAll();
}

function setBaken(si, bi, val) {
  slots[si].bets[bi].baken = val;
  slots[si].bets[bi].kaikata = val === '三連複' ? 'フォーメーション' : '';
  rebuildSlot(si);
  recalcAll();
}

function setBudget(si, bi, val) {
  // 予算変更で傾斜をクリア（比率が変わるため再計算が必要）
  if(slots[si].bets[bi].slope) {
    slots[si].bets[bi].slope = null;
    rebuildSlot(si);
  }
  slots[si].bets[bi].budget = val;
  scheduleRecalc();
  // 警告表示の更新（入力中はリビルドせず色だけ変える）
  const minB = getCount(slots[si].bets[bi]) * 100;
  const inp = document.querySelector(`#slot-card-${si} #bp-${si}-${bi} .bp-budget`);
  if(inp) {
    const warn = val < minB;
    inp.style.borderColor = warn ? '#f85149' : '';
    inp.style.color = warn ? '#f85149' : '#c9d1d9';
    const hint = inp.nextElementSibling;
    if(hint) {
      hint.style.color = warn ? '#f85149' : '#8b949e';
      hint.textContent = `円/レース${warn ? ` (最低¥${minB.toLocaleString()})` : ''}`;
    }
  }
}

function setKaikata(si, bi, val) {
  slots[si].bets[bi].kaikata = val;
  rebuildSlot(si);
  recalcAll();
}

function rebuildSlot(si) {
  document.getElementById(`slot-card-${si}`).innerHTML = buildSlotHTML(si);
}

function parseExcl(exclStr) {
  return new Set((exclStr||'').split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>0));
}

function companions(maxR, exclSet) {
  const out = [];
  for(let i=1;i<=maxR;i++) if(!exclSet.has(i)) out.push(i);
  return out;
}

function getCount(b) {
  if(b.baken==='3連単') return b.perms.filter(Boolean).length;
  const ex = parseExcl(b.excl);
  if(b.kaikata==='フォーメーション') {
    const comp = companions(b.maxR, ex).filter(c=>c!==b.ax1&&c!==b.ax2);
    const n = comp.length;
    // {ax1,ax2,c}: n combos; {ax1,c1,c2}: C(n,2); {ax2,c1,c2}: C(n,2)
    return n + Math.floor(n*(n-1)/2)*2;
  }
  if(b.kaikata==='流し') {
    const comp = companions(b.maxR, ex).filter(c=>c!==b.ax);
    const n = comp.length;
    return Math.floor(n*(n-1)/2);
  }
  if(b.kaikata==='ボックス') {
    const k = companions(b.maxR, ex).length;
    return Math.floor(k*(k-1)*(k-2)/6);
  }
  return 0;
}

function getIntraBetCombs(si, bi) {
  // dedupPairs: [[from, to], ...] → to側のbetからfrom側を引く
  const sl = slots[si];
  const myCombs = getBetCombSet(sl.bets[bi]);
  const pairs = sl.dedupPairs || [];
  // このbiがtoになっているペアを探す
  const subtractSources = pairs.filter(p=>p[1]===bi).map(p=>p[0]);
  if(!subtractSources.length) return myCombs;
  const subtractCombs = new Set();
  for(const src of subtractSources) for(const c of getBetCombSet(sl.bets[src])) subtractCombs.add(c);
  const result = new Set();
  for(const c of myCombs) if(!subtractCombs.has(c)) result.add(c);
  return result;
}

function totalPoints(si) {
  const sl = slots[si];
  let t = 0;
  const pairs = sl.dedupPairs || [];
  for(let bi=0;bi<sl.kinds;bi++) {
    if(pairs.some(p=>p[1]===bi)) {
      t += getIntraBetCombs(si, bi).size;
    } else {
      t += getCount(sl.bets[bi]);
    }
  }
  return t;
}

// --- 組み合わせセット系ヘルパー ---
function sortKey(arr) { return [...arr].sort((a,b)=>a-b).join(','); }

// getBetCombSet のメモ化キャッシュ（recalcAll 開始時にクリア）
const _combSetCache = new WeakMap();

function getBetCombSet(b) {
  if(_combSetCache.has(b)) return _combSetCache.get(b);
  const result = new Set();
  if(b.baken === '3連単') {
    const p = [[b.t_a,b.t_b,b.t_c],[b.t_a,b.t_c,b.t_b],[b.t_b,b.t_a,b.t_c],[b.t_b,b.t_c,b.t_a],[b.t_c,b.t_a,b.t_b],[b.t_c,b.t_b,b.t_a]];
    for(let i=0;i<6;i++) if(b.perms[i]) result.add(sortKey(p[i]));
  } else {
    const ex = parseExcl(b.excl);
    if(b.kaikata === 'フォーメーション') {
      const comp = companions(b.maxR, ex).filter(c=>c!==b.ax1&&c!==b.ax2);
      for(const c of comp) result.add(sortKey([b.ax1,b.ax2,c]));
      for(let i=0;i<comp.length;i++) for(let j=i+1;j<comp.length;j++) {
        result.add(sortKey([b.ax1,comp[i],comp[j]]));
        result.add(sortKey([b.ax2,comp[i],comp[j]]));
      }
    } else if(b.kaikata === '流し') {
      const comp = companions(b.maxR, ex).filter(c=>c!==b.ax);
      for(let i=0;i<comp.length;i++) for(let j=i+1;j<comp.length;j++)
        result.add(sortKey([b.ax,comp[i],comp[j]]));
    } else if(b.kaikata === 'ボックス') {
      const horses = companions(b.maxR, ex);
      for(let i=0;i<horses.length;i++) for(let j=i+1;j<horses.length;j++) for(let k=j+1;k<horses.length;k++)
        result.add(sortKey([horses[i],horses[j],horses[k]]));
    }
  }
  _combSetCache.set(b, result);
  return result;
}

function getSlotCombSet(si) {
  const sl = slots[si];
  const result = new Set();
  for(let bi=0;bi<sl.kinds;bi++) for(const c of getBetCombSet(sl.bets[bi])) result.add(c);
  return result;
}

function getDedupCombSet(si) {
  const sl = slots[si];
  const result = new Set();
  if(!sl.dedup || !sl.dedup.length) return result;
  for(const dsi of sl.dedup) for(const c of getSlotCombSet(dsi)) result.add(c);
  return result;
}

function getEffectiveSlotCombs(si) {
  const myCombs = getSlotCombSet(si);
  const dedupCombs = getDedupCombSet(si);
  if(!dedupCombs.size) return myCombs;
  const result = new Set();
  for(const c of myCombs) if(!dedupCombs.has(c)) result.add(c);
  return result;
}

function effectiveSlotPoints(si) {
  const sl = slots[si];
  if(!sl.dedup || !sl.dedup.length) return totalPoints(si);
  return getEffectiveSlotCombs(si).size;
}

function evalBet(b, race) {
  const top3 = race.top3;
  if(!top3 || top3.length < 3) return {hit:false, pay:0, is3T:b.baken==='3連単'};
  const ex = parseExcl(b.excl);
  const cnt = getCount(b);

  if(b.baken==='3連単') {
    const perms_def = [
      [b.t_a,b.t_b,b.t_c],[b.t_a,b.t_c,b.t_b],
      [b.t_b,b.t_a,b.t_c],[b.t_b,b.t_c,b.t_a],
      [b.t_c,b.t_a,b.t_b],[b.t_c,b.t_b,b.t_a],
    ];
    const hit = b.perms.some((on,i)=>on && perms_def[i][0]===top3[0] && perms_def[i][1]===top3[1] && perms_def[i][2]===top3[2]);
    const pay3T = (hit && race.tansho_pay) ? (b.budget / Math.max(cnt,1)) / 100 * race.tansho_pay : 0;
    return {hit, pay:pay3T, is3T:true, cnt};
  }

  // 傾斜がある場合の払戻計算ヘルパー
  const slopePay = (winKey, payout) => {
    if(b.slope && b.slope[winKey] !== undefined)
      return b.budget * b.slope[winKey] / 100 * payout;
    return (b.budget / Math.max(cnt,1)) / 100 * payout;
  };

  if(b.kaikata==='フォーメーション') {
    const axes = new Set([b.ax1,b.ax2]);
    const comp = new Set(companions(b.maxR, ex).filter(c=>c!==b.ax1&&c!==b.ax2));
    const axInTop3 = top3.some(p=>axes.has(p));
    const allCovered = top3.every(p=>axes.has(p)||comp.has(p));
    const hit = axInTop3 && allCovered;
    const pay = hit ? slopePay(sortKey(top3), race.payout) : 0;
    return {hit, pay, is3T:false, cnt};
  }
  if(b.kaikata==='流し') {
    const comp = new Set(companions(b.maxR, ex).filter(c=>c!==b.ax));
    const hit = top3.includes(b.ax) && top3.every(p=>p===b.ax||comp.has(p));
    const pay = hit ? slopePay(sortKey(top3), race.payout) : 0;
    return {hit, pay, is3T:false, cnt};
  }
  if(b.kaikata==='ボックス') {
    const horses = new Set(companions(b.maxR, ex));
    const hit = top3.every(p=>horses.has(p));
    const pay = hit ? slopePay(sortKey(top3), race.payout) : 0;
    return {hit, pay, is3T:false, cnt};
  }
  return {hit:false, pay:0, is3T:false, cnt};
}

/**
 * スロットのレース非依存データを事前計算（recalcAll で1回だけ呼ぶ）
 */
function buildSlotContext(si) {
  const sl = slots[si];
  const hasDedupSettings = sl.dedup && sl.dedup.length > 0;
  const dedupSet = hasDedupSettings ? getDedupCombSet(si) : null;
  const betCtxs = [];
  for(let bi=0;bi<sl.kinds;bi++) {
    const b = sl.bets[bi];
    if(b.baken === '3連単') {
      const cnt = b.perms.filter(Boolean).length;
      const perms_def = [
        [b.t_a,b.t_b,b.t_c],[b.t_a,b.t_c,b.t_b],
        [b.t_b,b.t_a,b.t_c],[b.t_b,b.t_c,b.t_a],
        [b.t_c,b.t_a,b.t_b],[b.t_c,b.t_b,b.t_a],
      ];
      const activePDs = perms_def.filter((_,i)=>b.perms[i]);
      betCtxs.push({baken:'3連単', budget:b.budget, cnt, activePDs});
    } else {
      // 三連複: effectiveCombs を事前計算
      const useDedup = hasDedupSettings || (sl.dedupPairs||[]).some(p=>p[1]===bi);
      let effectiveCombs;
      if(useDedup) {
        const intraCombs = getIntraBetCombs(si, bi);
        effectiveCombs = (hasDedupSettings && dedupSet && dedupSet.size)
          ? new Set([...intraCombs].filter(c=>!dedupSet.has(c)))
          : intraCombs;
      } else {
        effectiveCombs = getBetCombSet(b);
      }
      const fullCnt = getBetCombSet(b).size || 1;
      betCtxs.push({baken:'三連複', budget:b.budget, effectiveCombs, fullCnt, slope:b.slope});
    }
  }
  return betCtxs;
}

/**
 * 事前計算済みコンテキストを使って1レース分の結果を計算（高速版）
 */
function evalSlotRace(betCtxs, race) {
  let invest = 0, retPay = 0, anyHit = false, has3T = false;
  const top3 = race.top3;
  const hasTop3 = top3 && top3.length >= 3;
  const top3Key = hasTop3 ? sortKey(top3) : null;

  for(const ctx of betCtxs) {
    if(ctx.baken === '3連単') {
      invest += ctx.budget;
      if(hasTop3 && race.tansho_pay != null) {
        const hit = ctx.activePDs.some(pd => pd[0]===top3[0] && pd[1]===top3[1] && pd[2]===top3[2]);
        if(hit) {
          retPay += (ctx.budget / Math.max(ctx.cnt,1)) / 100 * race.tansho_pay;
          anyHit = true;
        }
      }
      if(race.tansho_pay == null) has3T = true;
    } else {
      // 三連複
      const {effectiveCombs, fullCnt, budget, slope} = ctx;
      let effInvest;
      if(slope) {
        effInvest = 0;
        for(const c of effectiveCombs) effInvest += budget * (slope[c] || 1/fullCnt);
        effInvest = Math.round(effInvest);
      } else {
        effInvest = Math.round(budget * effectiveCombs.size / fullCnt);
      }
      invest += effInvest;
      if(hasTop3 && effectiveCombs.has(top3Key)) {
        const perComboCost = slope
          ? budget * (slope[top3Key] || 1/fullCnt)
          : budget / fullCnt;
        retPay += perComboCost / 100 * (race.payout || 0);
        anyHit = true;
      }
    }
  }
  return {hit: anyHit, invest, pay: retPay, profit: retPay - invest, has3T};
}

function slotRaceResult(si, race) {
  const sl = slots[si];
  let invest = 0, retPay = 0, anyHit = false, has3T = false;
  const hasDedupSettings = sl.dedup && sl.dedup.length > 0;
  const dedupSet = hasDedupSettings ? getDedupCombSet(si) : null;

  for(let bi=0;bi<sl.kinds;bi++){
    const b = sl.bets[bi];

    if(b.baken !== '3連単' && (hasDedupSettings || (sl.dedupPairs||[]).some(p=>p[1]===bi))) {
      // イントラ除外（同スロット内種類間）→ スロット間除外の順で適用
      const intraCombs = getIntraBetCombs(si, bi);
      const effectiveCombs = (hasDedupSettings && dedupSet.size)
        ? new Set([...intraCombs].filter(c=>!dedupSet.has(c)))
        : intraCombs;
      const fullCombs = getBetCombSet(b);
      const fullCnt = fullCombs.size || 1;
      // 投資額：傾斜あり→有効コンボの配分合計、なし→比例
      let effectiveInvest;
      if(b.slope) {
        effectiveInvest = 0;
        for(const c of effectiveCombs) effectiveInvest += b.budget * (b.slope[c] || 1/fullCnt);
        effectiveInvest = Math.round(effectiveInvest);
      } else {
        effectiveInvest = Math.round(b.budget * effectiveCombs.size / fullCnt);
      }
      invest += effectiveInvest;

      if(effectiveCombs.size > 0 && race.top3 && race.top3.length >= 3) {
        const top3Key = sortKey(race.top3);
        if(effectiveCombs.has(top3Key)) {
          const perComboCost = b.slope
            ? b.budget * (b.slope[top3Key] || 1/fullCnt)
            : b.budget / fullCnt;
          retPay += perComboCost / 100 * (race.payout || 0);
          anyHit = true;
        }
      }
    } else {
      // 通常パス（3連単 or 除外設定なし）
      const res = evalBet(b, race);
      invest += b.budget;
      if(res.hit){ retPay += res.pay; anyHit = true; }
      if(res.is3T && race.tansho_pay == null) has3T = true;
    }
  }
  return {hit: anyHit, invest, pay: retPay, profit: retPay - invest, has3T};
}

function applySlope(si, bi) {
  const b = slots[si].bets[bi];
  const combs = [...getBetCombSet(b)];
  if(combs.length === 0) return;
  b.slope = computeSlopeWeights(combs, b.budget);
  rebuildSlot(si);
  recalcAll();
}

function clearSlope(si, bi) {
  slots[si].bets[bi].slope = null;
  rebuildSlot(si);
  recalcAll();
}

let _recalcSeq = 0; // 古いタスクをキャンセルするためのシーケンス番号

function recalcAll() {
  // --- 同期: 軽量な前処理のみ ---
  slots.forEach(sl => sl.bets.forEach(b => _combSetCache.delete(b)));
  slots.forEach(sl => {
    for(let bi=0;bi<sl.kinds;bi++) {
      const minB = getCount(sl.bets[bi]) * 100;
      if(sl.bets[bi].budget < minB) sl.bets[bi].budget = minB;
    }
  });
  slots.forEach(sl => {
    for(let bi=0;bi<sl.kinds;bi++) {
      const b = sl.bets[bi];
      if(b.slope) {
        const cc = getBetCombSet(b);
        const sk = new Set(Object.keys(b.slope));
        if(cc.size !== sk.size || ![...cc].every(c=>sk.has(c))) b.slope = null;
      }
    }
  });
  slots.forEach((sl,si)=>{
    const badge = document.getElementById(`pts-badge-${si}`);
    if(!badge) return;
    const total = totalPoints(si);
    const eff = effectiveSlotPoints(si);
    badge.textContent = (sl.dedup&&sl.dedup.length&&eff<total)
      ? `${eff}点（−${total-eff}重複除外）` : total+'点';
  });

  // --- 非同期: 重い計算+描画を setTimeout で分離 ---
  const seq = ++_recalcSeq;
  const activeSI = slots.map((sl,i)=>sl.on?i:-1).filter(i=>i>=0);

  setTimeout(() => {
    if(seq !== _recalcSeq) return; // 後から来たrecalcAllで上書きされたらスキップ
    console.time('recalc-compute');
    const slotCtxs = {};
    activeSI.forEach(si => { slotCtxs[si] = buildSlotContext(si); });
    _raceResultsCache = {};
    activeSI.forEach(si => {
      _raceResultsCache[si] = activeRaces.map(race => evalSlotRace(slotCtxs[si], race));
    });
    console.timeEnd('recalc-compute');

    setTimeout(() => {
      if(seq !== _recalcSeq) return;
      console.time('recalc-render');
      renderCmpTable();
      renderRaceTable();
      console.timeEnd('recalc-render');
    }, 0);
  }, 0);
}

function renderCmpTable() {
  const activeSI = slots.map((sl,i)=>sl.on?i:-1).filter(i=>i>=0);
  const tbl = document.getElementById('cmp-table');
  if(!activeSI.length){
    tbl.innerHTML='<tr><td style="color:#8b949e;padding:12px">アクティブなスロットがありません</td></tr>';
    return;
  }
  const agg = activeSI.map(si => {
    let hits=0, invest=0, pay=0, tg=0, has3T=false;
    const cached = _raceResultsCache && _raceResultsCache[si];
    activeRaces.forEach((race,i)=>{
      const r = cached ? cached[i] : slotRaceResult(si,race);
      invest += r.invest;
      pay += r.pay;
      if(r.hit) hits++;
      if(r.hit && r.pay < r.invest) tg++;
      if(r.has3T) has3T = true;
    });
    const n = activeRaces.length;
    return {si, hits, invest, pay, tg, n, has3T,
      hitRate: n ? hits/n*100 : 0,
      roi: invest ? pay/invest*100 : 0,
      profit: pay - invest,
      pts: effectiveSlotPoints(si),
    };
  });

  const slotHeaders = activeSI.map(si=>
    `<th style="color:${SLOT_COLORS[si]}">${escHtml(slots[si].name)}</th>`).join('');

  const rows = [
    ['総点数（1レース）', agg.map(a=>`<td>${a.pts.toLocaleString()}点</td>`).join('')],
    ['的中数', agg.map(a=>`<td>${a.hits.toLocaleString()}回</td>`).join('')],
    ['的中率', agg.map(a=>{const cl=a.hitRate>=30?'good':a.hitRate>=15?'warn':'bad';return `<td class="${cl}">${a.hitRate.toFixed(1)}%</td>`}).join('')],
    ['推定払戻合計', agg.map(a=>`<td>¥${Math.round(a.pay).toLocaleString()}${a.has3T?'<span title="一部レースの三連単配当データなし" style="color:#8b949e;font-size:10px"> ※</span>':''}</td>`).join('')],
    ['投資合計', agg.map(a=>`<td>¥${a.invest.toLocaleString()}</td>`).join('')],
    ['推定回収率', agg.map(a=>{const cl=a.roi>=100?'good':a.roi>=70?'warn':'bad';return `<td class="${cl}">${a.roi.toFixed(1)}%${a.has3T?'<span title="一部レースの三連単配当データなし" style="font-weight:normal;font-size:10px"> ※</span>':''}</td>`}).join('')],
    ['トリガミ数', agg.map(a=>`<td>${a.tg}回</td>`).join('')],
    ['推定純損益', agg.map(a=>{const cl=a.profit>=0?'good':'bad';return `<td class="${cl}">¥${Math.round(a.profit).toLocaleString()}${a.has3T?'<span title="一部レースの三連単配当データなし" style="font-weight:normal;font-size:10px"> ※</span>':''}</td>`}).join('')],
  ];

  tbl.innerHTML = `<thead><tr><th class="metric-h">指標</th>${slotHeaders}</tr></thead><tbody>` +
    rows.map(([label,cells])=>`<tr><td class="metric">${label}</td>${cells}</tr>`).join('') + '</tbody>';
}

function buildRaceFilterBtns() {
  const bar = document.getElementById('race-filter-bar');
  const activeSI = slots.map((sl,i)=>sl.on?i:-1).filter(i=>i>=0);
  bar.innerHTML = `
    <button class="rfbtn${raceFilter==='all'?' active':''}" onclick="setRaceFilter('all',this)">全レース</button>
    <button class="rfbtn${raceFilter==='change'?' active':''}" onclick="setRaceFilter('change',this)">変化あり</button>
    ${activeSI.map(si=>`<button class="rfbtn${raceFilter==='hit-'+si?' active':''}" onclick="setRaceFilter('hit-${si}',this)" style="${raceFilter==='hit-'+si?'':'border-color:'+SLOT_COLORS[si]+';color:'+SLOT_COLORS[si]}">${escHtml(slots[si].name)}的中</button>`).join('')}
  `;
}

function setRaceFilter(rf, btn) {
  raceFilter = rf;
  renderRaceTable();
}

function setRacePage(p) {
  racePage = p;
  renderRaceTable();
}

function renderRaceTable() {
  buildRaceFilterBtns();
  const activeSI = slots.map((sl,i)=>sl.on?i:-1).filter(i=>i>=0);
  const tbl = document.getElementById('race-table');

  // アクティブスロットの馬券種を集計
  const show3F = activeSI.some(si => slots[si].bets.slice(0, slots[si].kinds).some(b => b.baken === '三連複'));
  const show3T = activeSI.some(si => slots[si].bets.slice(0, slots[si].kinds).some(b => b.baken === '3連単'));
  const payColLabel = (show3F && show3T) ? '3連複 / 3連単' : show3T ? '3連単配当' : '3連複配当';

  const baseH = `<th class="lh" style="min-width:${colWidth}px">日付</th><th class="lh">レース</th><th class="lh">コース</th><th>${payColLabel}</th><th>距離</th><th style="min-width:180px">結果</th>`;
  const slotH = activeSI.map(si=>`<th style="color:${SLOT_COLORS[si]}" colspan="4">${escHtml(slots[si].name)}</th>`).join('');
  const subH  = activeSI.map(si=>
    `<th style="font-size:10px;color:${SLOT_COLORS[si]}88">的中</th><th style="font-size:10px;color:${SLOT_COLORS[si]}88">払戻推定</th><th style="font-size:10px;color:${SLOT_COLORS[si]}88">損益推定</th><th style="font-size:10px;color:${SLOT_COLORS[si]}88">回収率</th>`
  ).join('');
  tbl.querySelector('thead').innerHTML = `<tr>${baseH}${slotH}</tr><tr><th class="lh"></th><th class="lh"></th><th class="lh"></th><th></th><th></th><th></th>${subH}</tr>`;

  // フィルタ済みレースを先に絞り込む
  const filteredRaces = [];
  activeRaces.forEach((race, raceIdx) => {
    const results = activeSI.map(si => {
      const cached = _raceResultsCache && _raceResultsCache[si];
      return cached ? cached[raceIdx] : slotRaceResult(si, race);
    });
    if(raceFilter === 'change') {
      const hitVals = results.map(r=>r.hit);
      if(results.length < 2 || hitVals.every(h=>h===hitVals[0])) return;
    } else if(raceFilter.startsWith('hit-')) {
      const si = parseInt(raceFilter.slice(4));
      const idx = activeSI.indexOf(si);
      if(idx<0 || !results[idx].hit) return;
    }
    filteredRaces.push({race, raceIdx, results});
  });

  // ページネーション
  const totalPages = Math.ceil(filteredRaces.length / RACE_PAGE_SIZE);
  if(racePage >= totalPages) racePage = Math.max(0, totalPages - 1);
  const pageStart = racePage * RACE_PAGE_SIZE;
  const pageEnd = Math.min(pageStart + RACE_PAGE_SIZE, filteredRaces.length);
  const pageRaces = filteredRaces.slice(pageStart, pageEnd);

  const chakuMap = ['1着','2着','3着'];
  const popCls = ['ri-c1','ri-c2','ri-c3'];

  const rows = [];
  pageRaces.forEach(({race, raceIdx, results}) => {
    const mx = Math.max(...race.top3);
    const uLabel = mx<=3?'堅':mx<=5?'やや堅':mx<=8?'中波乱':mx<=11?'大波乱':'超波乱';

    // 結果セル（CSSクラスでインラインスタイルを排除）
    const info = race.top3_info || [];
    const pop3 = info.length > 0
      ? info.map((h,i)=>{
          const cc = h.pop<=3 ? popCls[h.pop-1] : 'ri-cx';
          return `<div class="ri-row"><span class="ri-pop ${cc}">${h.pop}人気</span><span class="ri-chu">(${chakuMap[i]||'—'})</span><span class="ri-nm">${h.horse||'—'}</span></div>`;
        }).join('')
      : (race.top3||[]).map((p,i)=>{
          const cc = p<=3 ? popCls[p-1] : 'ri-cx';
          return `<div class="ri-row"><span class="ri-pop ${cc}">${p}人気</span><span class="ri-chu">(${chakuMap[i]||'—'})</span></div>`;
        }).join('');

    const anyHit = results.some(r=>r.hit);
    const rowCls = anyHit ? 'row-hit' : 'row-miss';

    const slotCells = results.map(r=>{
      const hasPay = !r.has3T || (race.tansho_pay != null);
      const nd = (r.has3T && race.tansho_pay == null) ? '<span class="ri-pp" title="三連単配当データなし"> ※</span>' : '';
      const roiStr = (hasPay && r.invest && r.hit) ? (r.pay/r.invest*100).toFixed(0)+'%' : '—';
      const payStr = (hasPay && r.hit) ? '¥'+Math.round(r.pay).toLocaleString()+nd : (r.hit ? '—'+nd : '—');
      const profStr = (hasPay && r.hit) ? '¥'+Math.round(r.profit).toLocaleString() : '—';
      const profCls = r.hit && hasPay ? (r.profit>=0?' class="prof-pos"':' class="prof-neg"') : '';
      return `<td>${r.hit?'<span class="hit-badge hb-y">的中</span>':'<span class="hit-badge hb-n">外れ</span>'}</td><td>${payStr}</td><td${profCls}>${profStr}</td><td>${roiStr}</td>`;
    }).join('');

    // 配当セル
    let payCell = '';
    if(show3F && show3T) {
      const f = race.payout ? `¥${Math.round(race.payout).toLocaleString()}` : '—';
      const t = race.tansho_pay ? `¥${Math.round(race.tansho_pay).toLocaleString()}` : '—';
      payCell = `<td><span class="ri-pp">複</span>${f}<br><span class="ri-pp">単</span>${t}</td>`;
    } else if(show3T) {
      payCell = `<td>${race.tansho_pay ? '¥'+Math.round(race.tansho_pay).toLocaleString() : '—'}</td>`;
    } else {
      payCell = `<td>${race.payout ? '¥'+Math.round(race.payout).toLocaleString() : '—'}</td>`;
    }
    rows.push(`<tr class="${rowCls} race-row" onclick="openRaceModal(activeRaces[${raceIdx}])"><td class="lh">${race.date}</td><td class="lh">${race.race_num} ${escHtml(race.race_name)}</td><td class="lh">${race.track}</td>${payCell}<td>${race.distance}<br><span class="ri-pp">${uLabel}</span></td><td>${pop3}</td>${slotCells}</tr>`);
  });

  tbl.querySelector('tbody').innerHTML = rows.join('') || '<tr><td colspan="30" style="text-align:center;color:#8b949e;padding:20px">表示するレースがありません</td></tr>';

  // ページネーションUI
  const pgEl = document.getElementById('race-pagination');
  if(pgEl) {
    if(totalPages <= 1) {
      pgEl.innerHTML = `<span style="font-size:11px;color:#8b949e">${filteredRaces.length} レース</span>`;
    } else {
      const from = pageStart + 1, to = pageEnd;
      pgEl.innerHTML =
        `<button onclick="setRacePage(${racePage-1})" ${racePage===0?'disabled':''} style="background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:3px 10px;cursor:pointer;font-size:12px">＜前</button>` +
        `<span style="font-size:11px;color:#8b949e;padding:0 8px">${from}–${to} / ${filteredRaces.length}件 (${racePage+1}/${totalPages}ページ)</span>` +
        `<button onclick="setRacePage(${racePage+1})" ${racePage>=totalPages-1?'disabled':''} style="background:#21262d;border:1px solid #30363d;border-radius:4px;color:#8b949e;padding:3px 10px;cursor:pointer;font-size:12px">次＞</button>`;
    }
  }
}

function updateColWidth() {
  colWidth = parseInt(document.getElementById('col-w-slider').value);
  document.getElementById('col-w-val').textContent = colWidth + 'px';
  renderRaceTable();
}

initFilters();
buildSlots();
applyFilters();
</script>
